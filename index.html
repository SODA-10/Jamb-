<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JAMB e-Facility | 2026 UTME Result</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap');
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Roboto', system-ui, sans-serif;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }
    
    .phone-frame {
      width: 100%;
      max-width: 380px;
      height: 720px;
      background: #000;
      border-radius: 50px;
      padding: 15px;
      box-shadow: 0 0 30px rgba(0,0,0,0.9);
      overflow: hidden;
    }
    
    .screen {
      width: 100%;
      height: 100%;
      background: white;
      border-radius: 38px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      background: linear-gradient(90deg, #002868, #006400);
      color: white;
      padding: 12px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    
    .logo img {
      height: 50px;
      width: auto;
    }
    
    .header-text {
      display: flex;
      flex-direction: column;
    }
    
    .header-title {
      font-size: 16px;
      font-weight: 700;
    }
    
    .header-subtitle {
      font-size: 12px;
      opacity: 0.9;
    }
    
    .content {
      padding: 20px;
      overflow-y: auto;
      flex: 1;
    }
    
    .content h2 {
      text-align: center;
      color: #006400;
      margin-bottom: 20px;
      font-size: 20px;
    }
    
    .search-box {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .search-box input {
      flex: 1;
      padding: 10px;
      border: 2px solid #002868;
      border-radius: 8px;
      font-size: 12px;
    }
    
    .search-box button {
      padding: 10px 15px;
      background: #006400;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 700;
      font-size: 12px;
    }
    
    .search-box button:hover {
      background: #004d00;
    }
    
    .candidate-card {
      display: flex;
      gap: 15px;
      background: #f8f9fa;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .passport {
      width: 130px;
      height: 165px;
      border: 4px solid #002868;
      border-radius: 8px;
      overflow: hidden;
      flex-shrink: 0;
      background: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .passport img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    
    .passport-placeholder {
      text-align: center;
      color: #999;
      font-size: 12px;
    }
    
    .candidate-info {
      flex: 1;
      font-size: 13px;
      line-height: 1.6;
    }
    
    .candidate-info strong {
      display: block;
      margin-bottom: 8px;
      font-size: 14px;
    }
    
    .registration-id {
      color: #b71c1c;
      font-weight: 700;
      margin-bottom: 10px;
    }
    
    .result-box {
      text-align: center;
      padding: 25px 15px;
      border: 3px solid #ffc107;
      border-radius: 12px;
      background: #fffbf0;
      margin-top: 15px;
    }
    
    .result-box h3 {
      color: #006400;
      font-size: 14px;
      margin-bottom: 12px;
      font-weight: 700;
    }
    
    .status {
      font-size: 28px;
      font-weight: 700;
      color: #c62828;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    
    .status.passed {
      color: #28a745;
    }
    
    .warning {
      background: #fff3cd;
      padding: 12px 15px;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 15px;
      border-left: 4px solid #ffc107;
      color: #856404;
      line-height: 1.5;
    }
    
    .success-message {
      background: #d4edda;
      padding: 12px 15px;
      border-radius: 8px;
      font-size: 12px;
      margin-top: 15px;
      border-left: 4px solid #28a745;
      color: #155724;
      line-height: 1.5;
    }
    
    .footer {
      text-align: center;
      font-size: 11px;
      color: #666;
      padding: 15px;
      border-top: 1px solid #eee;
      margin-top: 15px;
    }
    
    .hidden {
      display: none;
    }
    
    .error-message {
      background: #f8d7da;
      padding: 12px 15px;
      border-radius: 8px;
      font-size: 12px;
      margin-bottom: 15px;
      border-left: 4px solid #dc3545;
      color: #721c24;
    }
    
    .image-upload {
      margin: 10px 0;
    }
    
    .image-upload input {
      font-size: 11px;
    }
    
    /* Scrollbar styling */
    .content::-webkit-scrollbar {
      width: 6px;
    }
    
    .content::-webkit-scrollbar-track {
      background: #f1f1f1;
      border-radius: 10px;
    }
    
    .content::-webkit-scrollbar-thumb {
      background: #888;
      border-radius: 10px;
    }
    
    .content::-webkit-scrollbar-thumb:hover {
      background: #555;
    }
    
    @media (max-width: 500px) {
      .phone-frame {
        border-radius: 30px;
        padding: 10px;
      }
      
      .screen {
        border-radius: 25px;
      }
      
      .candidate-card {
        flex-direction: column;
        align-items: center;
      }
      
      .passport {
        width: 140px;
        height: 180px;
      }
      
      .status {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>

  <div class="phone-frame">
    <div class="screen">

      <div class="header">
        <div class="logo">
          <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0f/JAMB_Logo.svg/512px-JAMB_Logo.svg.png" alt="JAMB Logo">
        </div>
        <div class="header-text">
          <div class="header-title">JAMB e-Facility</div>
          <div class="header-subtitle">UTME 2026</div>
        </div>
      </div>

      <div class="content">
        <h2>2026 UTME RESULT</h2>

        <!-- Search Section -->
        <div class="search-box">
          <input type="text" id="registrationInput" placeholder="Enter Registration ID">
          <button onclick="searchCandidate()">Search</button>
        </div>

        <!-- Error Message -->
        <div id="errorMessage" class="error-message hidden"></div>

        <!-- Result Section -->
        <div id="resultSection" class="hidden">
          <div class="candidate-card">
            <div class="passport">
              <img id="candidatePhoto" src="" alt="Candidate Photo">
            </div>
            <div class="candidate-info">
              <strong id="candidateName"></strong>
              <div class="registration-id" id="registrationId"></div>
              <div>
                <strong>Gender:</strong> <span id="gender"></span><br>
                <strong>State:</strong> <span id="state"></span><br>
                <strong>DOB:</strong> <span id="dob"></span><br>
                <strong>Status:</strong> <span id="candidateStatus" style="font-weight: 700;"></span>
              </div>
            </div>
          </div>

          <div class="result-box">
            <h3>OFFICIAL RESULT STATUS</h3>
            <div id="statusDisplay" class="status"></div>
            
            <div id="scoreDisplay" class="hidden" style="font-size: 16px; margin: 10px 0; color: #006400;">
              <strong>Total Score: <span id="totalScore"></span>/400</strong>
            </div>
            
            <div id="warningMessage" class="warning hidden"></div>
            <div id="successMessage" class="success-message hidden"></div>
          </div>
        </div>

        <!-- Sample Data Notice -->
        <div id="sampleNotice" class="warning">
          📝 Try searching with sample IDs: <br>
          <strong>202660786359HA</strong> (Withheld)<br>
          <strong>202660123456AB</strong> (Passed)
        </div>

        <div class="footer">
          <p>© 2026 JAMB e-Facility | All Rights Reserved</p>
          <p>For assistance, visit www.jamb.org.ng</p>
        </div>
      </div>

    </div>
  </div>

  <script>
    // Sample Database
    const candidateDatabase = {
      "202660786359HA": {
        name: "Sobajo Anuoluwapo",
        gender: "Male",
        state: "Ogun",
        dob: "01/10/2008",
        status: "WITHHELD",
        statusColor: "#c62828",
        photo: "https://via.placeholder.com/130x165?text=Anuoluwapo",
        message: "Your result has been withheld pending verification. Please contact JAMB for more information."
      },
      "202660123456AB": {
        name: "Chisom Okafor",
        gender: "Female",
        state: "Lagos",
        dob: "15/05/2007",
        status: "PASSED",
        score: 289,
        statusColor: "#28a745",
        photo: "https://via.placeholder.com/130x165?text=Chisom",
        message: "Congratulations! Your result has been processed successfully."
      },
      "202660789012CD": {
        name: "Ahmed Hassan",
        gender: "Male",
        state: "Kano",
        dob: "22/03/2008",
        status: "PASSED",
        score: 312,
        statusColor: "#28a745",
        photo: "https://via.placeholder.com/130x165?text=Ahmed",
        message: "Congratulations! Your result has been processed successfully."
      },
      "202660345678EF": {
        name: "Adeyemi Adesanya",
        gender: "Female",
        state: "Osun",
        dob: "08/07/2007",
        status: "WITHHELD",
        statusColor: "#c62828",
        photo: "https://via.placeholder.com/130x165?text=Adeyemi",
        message: "Your result has been withheld for review. Please check back later."
      }
    };

    function searchCandidate() {
      const registrationId = document.getElementById('registrationInput').value.trim().toUpperCase();
      const resultSection = document.getElementById('resultSection');
      const errorMessage = document.getElementById('errorMessage');
      const sampleNotice = document.getElementById('sampleNotice');

      // Clear previous messages
      errorMessage.classList.add('hidden');
      resultSection.classList.add('hidden');

      if (!registrationId) {
        showError("Please enter a registration ID");
        return;
      }

      const candidate = candidateDatabase[registrationId];

      if (!candidate) {
        showError("Registration ID not found. Please check and try again.");
        return;
      }

      // Hide sample notice
      sampleNotice.classList.add('hidden');

      // Display candidate information
      document.getElementById('candidateName').textContent = candidate.name;
      document.getElementById('registrationId').textContent = registrationId;
      document.getElementById('gender').textContent = candidate.gender;
      document.getElementById('state').textContent = candidate.state;
      document.getElementById('dob').textContent = candidate.dob;
      
      // Set status with color
      const statusSpan = document.getElementById('candidateStatus');
      statusSpan.textContent = candidate.status;
      statusSpan.style.color = candidate.statusColor;

      // Set status display
      const statusDisplay = document.getElementById('statusDisplay');
      statusDisplay.textContent = candidate.status;
      statusDisplay.style.color = candidate.statusColor;

      // Display score if passed
      const scoreDisplay = document.getElementById('scoreDisplay');
      if (candidate.score) {
        document.getElementById('totalScore').textContent = candidate.score;
        scoreDisplay.classList.remove('hidden');
      } else {
        scoreDisplay.classList.add('hidden');
      }

      // Set photo
      document.getElementById('candidatePhoto').src = candidate.photo;

      // Display appropriate message
      const warningMessage = document.getElementById('warningMessage');
      const successMessage = document.getElementById('successMessage');

      if (candidate.status === "WITHHELD") {
        warningMessage.textContent = "⚠️ " + candidate.message;
        warningMessage.classList.remove('hidden');
        successMessage.classList.add('hidden');
      } else {
        successMessage.textContent = "✅ " + candidate.message;
        successMessage.classList.remove('hidden');
        warningMessage.classList.add('hidden');
      }

      // Show result
      resultSection.classList.remove('hidden');
    }

    function showError(message) {
      const errorMessage = document.getElementById('errorMessage');
      errorMessage.textContent = "❌ " + message;
      errorMessage.classList.remove('hidden');
    }

    // Allow Enter key to search
    document.getElementById('registrationInput').addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        searchCandidate();
      }
    });
  </script>

</body>
</html>
